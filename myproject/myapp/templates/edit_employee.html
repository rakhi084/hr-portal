{% extends 'base.html' %}

{% block title %}
Edit Employee
{% endblock %}

{% block content %}

<div class="page-header">
    <h1>Edit Employee</h1>
</div>

<div class="form-card">

    <form method="POST">

        {% csrf_token %}

        <div class="form-grid">

            <!-- First Name -->
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="first_name"
                       value="{{ employee.user.first_name }}" required>
            </div>

            <!-- Last Name -->
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="last_name"
                       value="{{ employee.user.last_name }}" required>
            </div>

            <!-- Username -->
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username"
                       value="{{ employee.user.username }}" required>
            </div>

            <!-- Employee ID -->
            <div class="form-group">
                <label>Employee ID</label>
                <input type="text" name="employee_id"
                       value="{{ employee.employee_id }}" required>
            </div>

            <!-- Phone -->
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone"
                       value="{{ employee.phone }}">
            </div>

            <!-- Gender -->
            <div class="form-group">
                <label>Gender</label>

                <select name="gender">

                    <option value="Male"
                        {% if employee.gender == "Male" %}selected{% endif %}>
                        Male
                    </option>

                    <option value="Female"
                        {% if employee.gender == "Female" %}selected{% endif %}>
                        Female
                    </option>

                    <option value="Other"
                        {% if employee.gender == "Other" %}selected{% endif %}>
                        Other
                    </option>

                </select>

            </div>

            <!-- Address -->
            <div class="form-group full">
                <label>Address</label>

                <textarea name="address">{{ employee.address }}</textarea>

            </div>

            <!-- Department -->
            <div class="form-group">
                <label>Department</label>
                <input type="text" name="department"
                       value="{{ employee.department }}">
            </div>

            <!-- Designation -->
            <div class="form-group">
                <label>Designation</label>
                <input type="text" name="designation"
                       value="{{ employee.designation }}">
            </div>

            <!-- Salary -->
            <div class="form-group">
                <label>Salary</label>
                <input type="number"
                       step="0.01"
                       name="salary"
                       value="{{ employee.salary }}">
            </div>

            <!-- Joining Date -->
            <div class="form-group">
                <label>Joining Date</label>
                <input type="date"
                       name="joining_date"
                       value="{{ employee.joining_date|date:'Y-m-d' }}">
            </div>

            <!-- Status -->
            <div class="form-group">
                <label>Status</label>

                <select name="status">

                    <option value="Active"
                        {% if employee.status == "Active" %}selected{% endif %}>
                        Active
                    </option>

                    <option value="Inactive"
                        {% if employee.status == "Inactive" %}selected{% endif %}>
                        Inactive
                    </option>

                </select>

            </div>

        </div>

        <button type="submit" class="save-btn">

            <i class="fa-solid fa-floppy-disk"></i>

            Update Employee

        </button>

    </form>

</div>

{% endblock %}
